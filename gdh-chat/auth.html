<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход в ШМЯКС</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&display=swap" rel="stylesheet">
<style>
    @font-face {
    font-family: 'Durik';
    src: url('durik.woff2') format('woff2'),
         url('durik.woff') format('woff'),
         url('durik.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
    font-display: swap; 
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Geologica", sans-serif;
    }
    
    body {
        background: #161616;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    
    .auth-container {
        max-width: 450px;
        width: 100%;
        background: #242424;
        box-shadow: 10px 10px 0px 0px rgba(0, 0, 0, 0.3);
        padding: 30px;
    }
    
    .logo {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .logo img {
        width: 80px;
        height: 80px;
        border-radius: 20%;
        margin-bottom: 10px;
        rotate: -1deg;
    }
    
    .logo h1 {
        font-family: 'Durik', 'Impact', sans-serif;
        font-size: 40px;
        background: linear-gradient(135deg, #8732dd, #ffa909);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
    
    .logo p {
        color: #888;
        font-size: 14px;
    }
    
    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
    }
    
    .tab-btn {
        flex: 1;
        background: none;
        border: none;
        padding: 10px;
        color: #888;
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        transition: all 0.3s;
    }
    
    .tab-btn.active {
        color: #c7963a;
        margin-bottom: -2px;
    }
    
    .form {
        display: none;
    }
    
    .form.active {
        display: block;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        color: #eaeaf0;
        margin-bottom: 8px;
        font-size: 14px;
    }
    
    .form-group input {
        width: 100%;
        padding: 12px;
        background: #3c3c3c;
        border: none;
        color: #eaeaf0;
        font-size: 14px;
        outline: none;
        transition: all 0.3s;
    }
    
    .form-group input:focus {
        background: #4a4a4a;
    }
    
    .form-group input.error {

    }
    
    .error-message {
        color: #ff4444;
        font-size: 12px;
        margin-top: 5px;
        display: none;
    }
    
    .error-message.show {
        display: block;
    }

    .avatar-random {
        background: #c7963a;
        border: none;
        padding: 8px 12px;
        color: white;
        cursor: pointer;
        font-size: 12px;
    }
    
    .btn-submit {
        width: 100%;
        padding: 12px;
        background: #c7963a;
        border: none;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
    }
    
    .btn-submit:hover:not(:disabled) {
        background: #ae84d9;
    }
    
    .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    
    .info-text {
        text-align: center;
        color: #888;
        font-size: 12px;
        margin-top: 20px;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #fff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
    }
    
    @keyframes wobble-sharp {
        0% { transform: rotate(-2deg); }
        50% { transform: rotate(2deg); }
        100% { transform: rotate(-2deg); }
    }

    .animated {
        animation: wobble-sharp 1.5s steps(1) infinite;
    }
</style>
</head>
<body>
<div class="auth-container">
    <div class="logo animated">
        <img src="Frame 6.png" alt="Логотип">
        <h1>ШМЯКС</h1>
        <p>первый гармоничный</p>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="login">Вход</button>
        <button class="tab-btn" data-tab="register">Регистрация</button>
    </div>
    
    <!-- Форма входа -->
    <div class="form active" id="loginForm">
        <form id="loginFormElement" onsubmit="return false;">
            <div class="form-group">
                <label>ID пользователя</label>
                <input type="text" id="loginId" name="username" placeholder="@" autocomplete="username">
                <div class="error-message" id="loginIdError"></div>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" name="password" autocomplete="current-password">
                <div class="error-message" id="loginPasswordError"></div>
            </div>
            <button type="submit" class="btn-submit" id="loginBtn">Войти</button>
        </form>
    </div>
    
    <!-- Форма регистрации -->
    <div class="form" id="registerForm">
        <form id="registerFormElement" onsubmit="return false;">
            <div class="form-group">
                <label>ID пользователя</label>
                <input type="text" id="regId" name="username" placeholder="@" autocomplete="username">
                <div class="error-message" id="regIdError"></div>
            </div>
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="regName" name="name" autocomplete="name">
                <div class="error-message" id="regNameError"></div>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="regPassword" name="new-password" autocomplete="new-password">
                <div class="error-message" id="regPasswordError"></div>
            </div>
            <button type="submit" class="btn-submit" id="registerBtn">Зарегистрироваться</button>
        </form>
    </div>
    
    <div class="info-text">
        Ожидайте дальнейших указаний.
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDivdBujXfqmNEFnMrwcrd40edGJh9RyJQ",
    authDomain: "gdh-chat.firebaseapp.com",
    appId: "1:212928743162:web:84a3ce962011d5ee6b6b43",
    projectId: "gdh-chat",
    storageBucket: "gdh-chat.firebasestorage.app",
    messagingSenderId: "212928743162",
    databaseURL: "https://gdh-chat-default-rtdb.europe-west1.firebasedatabase.app",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Функция автоматического добавления @
function setupAutoAtSymbol(inputElement) {
    if (!inputElement) return;
    
    inputElement.addEventListener('input', (e) => {
        let value = e.target.value;
        if (value.length > 0 && value[0] !== '@') {
            e.target.value = '@' + value.replace(/@/g, '');
        }
        if (value.indexOf('@') !== 0 && value.length > 0) {
            e.target.value = '@' + value.replace(/@/g, '');
        }
    });    
    inputElement.addEventListener('focus', (e) => {
        if (e.target.value === '') {
            e.target.value = '@';
        }
    });
    
    inputElement.addEventListener('blur', (e) => {
        if (e.target.value === '@') {
            e.target.value = '';
        }
    });
}

// Настройка полей с @
const loginIdInput = document.getElementById('loginId');
const regIdInput = document.getElementById('regId');
setupAutoAtSymbol(loginIdInput);
setupAutoAtSymbol(regIdInput);

// Переключение между вкладками
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById(tab + 'Form').classList.add('active');
        clearErrors();
    });
});

// Валидация ID
function validateId(id) {
    let cleanId = id;
    if (cleanId.startsWith('@')) {
        cleanId = cleanId.substring(1);
    }
    const regex = /^[a-zA-Z0-9_]+$/;
    return regex.test(cleanId) && cleanId.length > 0;
}

// Очистка ошибок
function clearErrors() {
    document.querySelectorAll('.error-message').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
    });
    document.querySelectorAll('.form-group input').forEach(input => {
        input.classList.remove('error');
    });
}

function showError(elementId, message) {
    const errorEl = document.getElementById(elementId);
    errorEl.textContent = message;
    errorEl.classList.add('show');
    const input = errorEl.closest('.form-group')?.querySelector('input');
    if (input) input.classList.add('error');
}
const registerForm = document.getElementById('registerFormElement');
registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();
    
    let rawId = document.getElementById('regId').value.trim();
    let id = rawId.startsWith('@') ? rawId : '@' + rawId;
    const name = document.getElementById('regName').value.trim();
    const password = document.getElementById('regPassword').value;
    const avatar = "https://i.imgur.com/lBk0HRI.png"; // Аватар по умолчанию
    
    let hasError = false;
    
    if (!rawId || rawId === '@') {
        showError('regIdError', 'Введите ID пользователя');
        hasError = true;
    } else if (!validateId(id)) {
        showError('regIdError', 'ID должен содержать только латиницу, цифры и _');
        hasError = true;
    }
    
    if (!name) {
        showError('regNameError', 'Введите имя');
        hasError = true;
    } else if (name.length < 2) {
        showError('regNameError', 'Имя слишком короткое');
        hasError = true;
    }
    
    if (!password) {
        showError('regPasswordError', 'Введите пароль');
        hasError = true;
    } else if (password.length < 4) {
        showError('regPasswordError', 'Пароль должен быть минимум 4 символа');
        hasError = true;
    }
    
    if (hasError) return;
    
    const userRef = ref(db, `users/${id}`);
    const snapshot = await get(userRef);
    
    if (snapshot.exists()) {
        showError('regIdError', 'Пользователь с таким ID уже существует');
        return;
    }
    
    const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
    
    const userData = {
        id: id,
        name: name,
        avatar: avatar,
        color: randomColor,
        password: password,
        createdAt: Date.now()
    };
    
    await set(userRef, userData);
    
    // Добавляем пользователя в user_chats
    const userChatsRef = ref(db, `user_chats/${id}`);
    await set(userChatsRef, {
        "testchat": true
    });
    
    // Добавляем пользователя в chat_members для чата testchat
    const memberRef = ref(db, `chat_members/testchat/${id}`);
    await set(memberRef, true);
    
    localStorage.setItem('currentUser', JSON.stringify({
        id: id,
        name: name,
        avatar: avatar,
        color: randomColor
    }));
    
    setTimeout(() => {
        window.location.href = 'index.html';
    }, 100);
});

// ========== ВХОД ==========
const loginForm = document.getElementById('loginFormElement');
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();
    
    let rawId = document.getElementById('loginId').value.trim();
    let id = rawId.startsWith('@') ? rawId : '@' + rawId;
    const password = document.getElementById('loginPassword').value;
    
    if (!rawId || rawId === '@') {
        showError('loginIdError', 'Введите ID');
        return;
    }
    
    if (!password) {
        showError('loginPasswordError', 'Введите пароль');
        return;
    }
    
    const userRef = ref(db, `users/${id}`);
    const snapshot = await get(userRef);
    
    if (!snapshot.exists()) {
        showError('loginIdError', 'Пользователь не найден');
        return;
    }
    
    const user = snapshot.val();
    
    if (user.password !== password) {
        showError('loginPasswordError', 'Неверный пароль');
        return;
    }
    
    localStorage.setItem('currentUser', JSON.stringify({
        id: user.id,
        name: user.name,
        avatar: user.avatar,
        color: user.color
    }));
    
    // Небольшая задержка перед редиректом, чтобы браузер успел запомнить пароль
    setTimeout(() => {
        window.location.href = 'index.html';
    }, 100);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>КОСМИЧЕСКАЯ ДУЭЛЬ · РЕТРО РАДАР · МУЛЬТИПЛЕЕР</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    .player-only-mode .enemy-panel .knob-container,
    .player-only-mode .enemy-panel .move-btn {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.5);
    }

    .player-only-mode .enemy-panel {
      border-color: #3a3a4a;
    }

    /* Небольшая подсказка на панели врага */
    .player-only-mode .enemy-panel::before {
      position: absolute;
      background: #1a1a2a;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      color: #888;
      margin-top: -10px;
    }
    body {
      background: #0a0b0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', 'Lucida Console', monospace;
      padding: 20px;
      background-image: radial-gradient(#1a1f2b 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .game-container {
      background: #13161c;
      border: 4px solid #3a4455;
      border-radius: 28px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cockpit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
      flex-wrap: wrap;
    }
    .enemy-panel, .player-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      background: #181c24;
      border-radius: 40px;
      padding: 18px 12px;
      border: 2px solid;
    }
    .enemy-panel { border-color: #5a3b4c; }
    .player-panel { border-color: #2a4a6a; }
    .knob-label {
      font-weight: bold;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .enemy-panel .knob-label { color: #d4a0b0; text-shadow: 0 0 6px #f06; }
    .player-panel .knob-label { color: #a0c8f0; text-shadow: 0 0 6px #08f; }
    .knob-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    canvas.knob {
      background: #20242c;
      border-radius: 50%;
      border: 3px solid #5a5a6a;
      cursor: pointer;
    }
    .angle-display {
      font-size: 18px;
      font-weight: bold;
      background: #0b0e12;
      padding: 5px 12px;
      border-radius: 14px;
      border: 1px solid #445;
      color: white;
      min-width: 70px;
      text-align: center;
    }
    .move-btn {
      background: #22262e;
      border: 2px solid;
      color: #ddd;
      font-weight: bold;
      font-size: 18px;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 2px;
      font-family: inherit;
      transition: 0.1s;
    }
    .move-btn:active { transform: scale(0.95); }
    .radar-screen {
      background: #0f1219;
      border-radius: 50%;
      border: 6px solid #2f384a;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.9), 0 0 35px #1a3a4a;
      overflow: hidden;
    }
    canvas#gameCanvas {
      display: block;
      border-radius: 50%;
      background: #0b0e14;
    }
    .fire-controls {
      display: flex;
      gap: 45px;
      margin-top: 18px;
    }
    .fire-btn {
      font-family: inherit;
      font-weight: bold;
      font-size: 20px;
      padding: 12px 32px;
      border-radius: 40px;
      background: #1a1d24;
      text-transform: uppercase;
      letter-spacing: 3px;
      cursor: pointer;
      border: 2px solid;
      transition: 0.1s;
    }
    .fire-btn:active { transform: scale(0.95); }
    .fire-player { border-color: #fff; color: #fff; background: #2a4a6a; }
    .fire-enemy { border-color: #c44242; color: #c44242; background: #2a1a1a; }

    .stats-bar {
      display: flex;
      gap: 15px;
      margin-top: 18px;
      background: #0a0d12;
      padding: 10px 20px;
      border-radius: 30px;
      border: 1px solid #3a4050;
      color: #aaa;
      font-size: 11px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .stat input {
      width: 65px;
      background: #1c2028;
      border: 1px solid #556;
      color: #ffd966;
      font-weight: bold;
      text-align: center;
      padding: 4px;
      border-radius: 8px;
      font-family: inherit;
    }
    .hit-flash {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      font-size: 28px;
      font-weight: bold;
      white-space: nowrap;
      animation: hitAnimation 0.5s ease-out forwards;
      text-shadow: 0 0 10px currentColor;
    }
    @keyframes hitAnimation {
      0% { opacity: 1; transform: scale(0.5) translate(0, 0); }
      100% { opacity: 0; transform: scale(1.5) translate(var(--dx, 0), var(--dy, -50px)); }
    }
    .ship-flash {
      animation: shipBlink 0.2s ease-out;
    }
    @keyframes shipBlink {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(2) drop-shadow(0 0 8px red); }
    }
    .connection-status {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #1a1a2a;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: #0f0;
      font-family: monospace;
      border: 1px solid #0f0;
      z-index: 999;
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-30px); }
    }
  </style>
</head>
<body>
<div class="connection-status" id="connStatus">СИНХРОНИЗАЦИЯ...</div>
<div class="game-container player-only-mode">
  <div class="cockpit">
    <div class="enemy-panel">
      <div class="knob-container">
        <span class="knob-label">ПУШКА А</span>
        <canvas id="enemyKnobGunA" class="knob" width="70" height="70"></canvas>
      </div>
      <div class="knob-container">
        <span class="knob-label">ПУШКА Б</span>
        <canvas id="enemyKnobGunB" class="knob" width="70" height="70"></canvas>
      </div>
      <div class="knob-container">
        <span class="knob-label">КУРС</span>
        <canvas id="enemyKnobDir" class="knob" width="70" height="70"></canvas>
        <span class="angle-display" id="enemyAngleDisplay">0°</span>
      </div>
      <button class="move-btn" id="enemyMoveBtn">↻ ХОД</button>
    </div>

    <div class="radar-screen">
      <canvas id="gameCanvas" width="750" height="750"></canvas>
    </div>

    <div class="player-panel">
      <div class="knob-container">
        <span class="knob-label">ОРУДИЕ</span>
        <canvas id="playerKnobGun" class="knob" width="70" height="70"></canvas>
      </div>
      <div class="knob-container">
        <span class="knob-label">КУРС</span>
        <canvas id="playerKnobDir" class="knob" width="70" height="70"></canvas>
        <span class="angle-display" id="playerAngleDisplay">0°</span>
      </div>
      <button class="move-btn" id="playerMoveBtn">↻ ХОД</button>
    </div>
  </div>

  <div class="fire-controls">
    <button class="fire-btn fire-enemy" id="enemyFireBtn">ОГОНЬ</button>
    <button class="fire-btn fire-player" id="playerFireBtn">ОГОНЬ</button>
  </div>

  <div class="stats-bar">
    <div class="stat">Враг шаг <input id="enemyStep" type="number" value="90"></div>
    <div class="stat">Враг радиус <input id="enemyRadius" type="number" value="260"></div>
    <div class="stat">Враг урон <input id="enemyDamage" type="number" value="40"></div>
    <div class="stat">Наш шаг <input id="playerStep" type="number" value="76"></div>
    <div class="stat">Наш радиус <input id="playerRadius" type="number" value="235"></div>
    <div class="stat">Наш урон <input id="playerDamage" type="number" value="30"></div>
    <div class="stat">Угол пушки <input id="gunConstraint" type="number" value="40" step="5"></div>
  </div>
</div>

<div style="position: fixed; bottom: 15px; right: 15px; cursor: pointer; z-index: 9999; filter: drop-shadow(0 0 8px rgba(255, 200, 0, 0.5));" id="beerMug">
  <svg width="48" height="48" viewBox="0 0 100 100" style="background: rgba(0,0,0,0.6); border-radius: 50%; padding: 8px;">
    <rect x="25" y="35" width="40" height="45" rx="5" fill="#d4a017" stroke="#8b6914" stroke-width="2"/>
    <rect x="25" y="32" width="40" height="10" rx="3" fill="#fff8dc" stroke="#8b6914" stroke-width="1.5"/>
    <path d="M65 45 Q80 45 80 55 Q80 65 65 65" fill="none" stroke="#8b6914" stroke-width="4"/>
    <circle cx="35" cy="55" r="2" fill="#fff" opacity="0.7"/>
    <circle cx="45" cy="65" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="55" cy="52" r="2.5" fill="#fff" opacity="0.7"/>
    <circle cx="40" cy="72" r="1.5" fill="#fff" opacity="0.5"/>
    <text x="50" y="95" text-anchor="middle" font-size="14" fill="#ffd700" font-weight="bold" font-family="monospace">🍺</text>
  </svg>
</div>

<script>
  // ========== НАСТРОЙКА FIREBASE ==========
  const firebaseConfig = {
    apiKey: "AIzaSyBEySWE_oOk9vrY4wXqQRzXVBdklUBfg0c",
    authDomain: "chux-d64af.firebaseapp.com",
    databaseURL: "https://chux-d64af-default-rtdb.firebaseio.com",
    projectId: "chux-d64af",
    storageBucket: "chux-d64af.firebasestorage.app",
    messagingSenderId: "851414160802",
    appId: "1:851414160802:web:d0f5917c7320fa5b694efb",
    measurementId: "G-BC2G8E8NN3"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const gameRef = db.ref('game');
  
  // Флаг для предотвращения обратной синхронизации
  let isSyncing = false;
  
  // ========== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ==========
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  // Игроки
  let player = {
    x: 0, y: 0,
    angle: 1,
    gunAngle: Math.PI,
    health: 300,
    moveAngleOffset: 0,
    totalAngleOffset: 0
  };
  
  let enemy = {
    x: -350, y: 450,
    angle: 1,
    gunAAngle: 0.8,
    gunBAngle: -0.8,
    health: 300,
    moveAngleOffset: 0,
    totalAngleOffset: 0
  };
  
  let mines = [];
  let tracers = [];
  let cameraX = 375, cameraY = 250;
  
  // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
  function getEnemyStep() { return parseInt(document.getElementById('enemyStep').value) || 90; }
  function getEnemyRadius() { return parseInt(document.getElementById('enemyRadius').value) || 260; }
  function getEnemyDamage() { return parseInt(document.getElementById('enemyDamage').value) || 40; }
  function getPlayerStep() { return parseInt(document.getElementById('playerStep').value) || 76; }
  function getPlayerRadius() { return parseInt(document.getElementById('playerRadius').value) || 235; }
  function getPlayerDamage() { return parseInt(document.getElementById('playerDamage').value) || 30; }
  
  function updateCamera() {
    cameraX = (player.x + enemy.x) / 2;
    cameraY = (player.y + enemy.y) / 2;
  }
  
  function showHitAnimation(x, y, isPlayerHit) {
    const flash = document.createElement('div');
    flash.className = 'hit-flash';
    flash.textContent = '💥 ПОПАДАНИЕ 💥';
    flash.style.color = isPlayerHit ? '#ff5555' : '#55ff55';
    flash.style.left = (x - 60) + 'px';
    flash.style.top = (y - 30) + 'px';
    flash.style.setProperty('--dx', (Math.random() - 0.5) * 50 + 'px');
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 500);
    
    const panel = document.querySelector(isPlayerHit ? '.player-panel' : '.enemy-panel');
    if (panel) {
      panel.classList.add('ship-flash');
      setTimeout(() => panel.classList.remove('ship-flash'), 200);
    }
  }
  
  function addTracer(fromX, fromY, toX, toY, color) {
    tracers.push({ fromX, fromY, toX, toY, color, progress: 0 });
  }
  
  function addMine(x, y) {
    mines.push({ x: x, y: y, radius: 18, damage: 25 });
  }
  
  // ========== СТРЕЛЬБА ==========
  function fireShip(attacker, defender, damage, isEnemyAttacker) {
    if (isSyncing) return;
    
    let hit = false;
    
    if (!isEnemyAttacker) {
      // Стрельба игрока
      const worldAngle = player.angle + player.gunAngle - Math.PI/2;
      const dist = Math.hypot(defender.x - player.x, defender.y - player.y);
      
      if (dist <= getPlayerRadius()) {
        const angleToDef = Math.atan2(defender.y - player.y, defender.x - player.x);
        let diff = Math.abs(((worldAngle - angleToDef) + Math.PI) % (2*Math.PI) - Math.PI);
        
        if (diff < 0.1) {
          defender.health = Math.max(0, defender.health - damage);
          hit = true;
          
          const cx = 375, cy = 375;
          const fromX = player.x - cameraX + cx;
          const fromY = player.y - cameraY + cy;
          const toX = defender.x - cameraX + cx;
          const toY = defender.y - cameraY + cy;
          addTracer(fromX, fromY, toX, toY, '#ffffff');
          
          const rect = canvas.getBoundingClientRect();
          showHitAnimation(rect.left + toX, rect.top + toY, true);
        }
      }
    } else {
      // Стрельба врага (две пушки)
      const guns = [enemy.angle + enemy.gunAAngle - Math.PI/2, enemy.angle + enemy.gunBAngle - Math.PI/2];
      guns.forEach(worldAngle => {
        const mineX = enemy.x + Math.cos(worldAngle) * getEnemyRadius();
        const mineY = enemy.y + Math.sin(worldAngle) * getEnemyRadius();
        addMine(mineX, mineY);
        
        const dist = Math.hypot(defender.x - enemy.x, defender.y - enemy.y);
        if (dist <= getEnemyRadius()) {
          const angleToDef = Math.atan2(defender.y - enemy.y, defender.x - enemy.x);
          let diff = Math.abs(((worldAngle - angleToDef) + Math.PI) % (2*Math.PI) - Math.PI);
          
          if (diff < 0.1) {
            defender.health = Math.max(0, defender.health - damage);
            hit = true;
            
            const cx = 375, cy = 375;
            const fromX = enemy.x - cameraX + cx;
            const fromY = enemy.y - cameraY + cy;
            const toX = defender.x - cameraX + cx;
            const toY = defender.y - cameraY + cy;
            addTracer(fromX, fromY, toX, toY, '#ff5577');
            
            const rect = canvas.getBoundingClientRect();
            showHitAnimation(rect.left + toX, rect.top + toY, false);
          }
        }
      });
    }
    
    if (hit && navigator.vibrate) navigator.vibrate(100);
    syncToFirebase();
  }
  
  // ========== ДВИЖЕНИЕ ==========
  function moveShip(ship, step, isPlayer) {
    if (isSyncing) return;
    
    const directionAngle = ship.angle - Math.PI/2;
    ship.x += Math.cos(directionAngle) * step;
    ship.y += Math.sin(directionAngle) * step;
    ship.moveAngleOffset = 0;
    
    updateCamera();
    updateAngleDisplays();
    syncToFirebase();
  }
  
  // ========== ОТОБРАЖЕНИЕ УГЛОВ ==========
  function updateAngleDisplays() {
    const pDeg = (player.moveAngleOffset * 180 / Math.PI).toFixed(1);
    const eDeg = (enemy.moveAngleOffset * 180 / Math.PI).toFixed(1);
    
    document.getElementById('playerAngleDisplay').textContent = pDeg + '°';
    document.getElementById('enemyAngleDisplay').textContent = eDeg + '°';
    
    const absP = Math.abs(player.moveAngleOffset * 180 / Math.PI);
    const pColor = absP > 40 ? '#ff5555' : (absP > 20 ? '#ffdd44' : 'white');
    document.getElementById('playerAngleDisplay').style.color = pColor;
    
    const absE = Math.abs(enemy.moveAngleOffset * 180 / Math.PI);
    const eColor = absE > 40 ? '#ff5555' : (absE > 20 ? '#ffdd44' : 'white');
    document.getElementById('enemyAngleDisplay').style.color = eColor;
  }
  
  // ========== ОТРИСОВКА ==========
  function drawShip(ctx, ship, offX, offY, isEnemy) {
    const sx = ship.x - offX + canvas.width/2;
    const sy = ship.y - offY + canvas.height/2;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(ship.angle);
    
    const healthPercent = Math.max(0, ship.health / 300);
    const color = `rgb(255, ${Math.floor(255 * healthPercent)}, ${Math.floor(255 * healthPercent)})`;
    ctx.fillStyle = color;
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1.8;
    
    if (isEnemy) {
      // Враг
      ctx.beginPath();
      ctx.moveTo(0, -20);
      ctx.lineTo(-2, -20);
      ctx.lineTo(-4, -13);
      ctx.lineTo(-7, -12);
      ctx.lineTo(-7, -10);
      ctx.lineTo(-9, -10);
      ctx.lineTo(-9, 0);
      ctx.lineTo(-7, 0);
      ctx.lineTo(-7, 1);
      ctx.lineTo(-12, 9);
      ctx.lineTo(-7, 11);
      ctx.lineTo(-7, 13);
      ctx.lineTo(0, 11);
      ctx.lineTo(7, 13);
      ctx.lineTo(7, 11);
      ctx.lineTo(12, 9);
      ctx.lineTo(7, 1);
      ctx.lineTo(7, 0);
      ctx.lineTo(9, 0);
      ctx.lineTo(9, -10);
      ctx.lineTo(7, -10);
      ctx.lineTo(7, -12);
      ctx.lineTo(4, -13);
      ctx.lineTo(2, -20);
      ctx.fill();
    } else {
      // Игрок
      ctx.beginPath();
      ctx.moveTo(2, -16);
      ctx.lineTo(-4, -16);
      ctx.lineTo(-4, -13);
      ctx.lineTo(-5, -9);
      ctx.lineTo(-5, -7);
      ctx.lineTo(-8, -7);
      ctx.lineTo(-8, 0);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-6, 2);
      ctx.lineTo(-7, 2);
      ctx.lineTo(-7, 8);
      ctx.lineTo(-6, 8);
      ctx.lineTo(-6, 12);
      ctx.lineTo(-3, 12);
      ctx.lineTo(-3, 10);
      ctx.lineTo(-1.5, 10);
      ctx.lineTo(-1.5, 12);
      ctx.lineTo(1.5, 12);
      ctx.lineTo(1.5, 10);
      ctx.lineTo(3, 10);
      ctx.lineTo(3, 12);
      ctx.lineTo(6, 12);
      ctx.lineTo(6, 8);
      ctx.lineTo(7, 8);
      ctx.lineTo(7, 2);
      ctx.lineTo(6, 2);
      ctx.lineTo(6, 0);
      ctx.lineTo(8, 0);
      ctx.lineTo(8, -7);
      ctx.lineTo(5, -7);
      ctx.lineTo(5, -9);
      ctx.lineTo(4, -13);
      ctx.lineTo(2, -13);
      ctx.fill();
    }
    ctx.restore();
  }
  
  function drawRadar() {
    ctx.clearRect(0, 0, 750, 750);
    ctx.save();
    ctx.beginPath();
    ctx.arc(375, 375, 371, 0, 2*Math.PI);
    ctx.clip();
    ctx.fillStyle = '#0b0e14';
    ctx.fillRect(0, 0, 750, 750);
    
    ctx.strokeStyle = '#1e2a32';
    ctx.lineWidth = 0.7;
    for(let i = 0; i < 750; i += 35) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 750); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(750, i); ctx.stroke();
    }
    ctx.strokeStyle = '#2a3a44';
    ctx.lineWidth = 1.2;
    for(let i = 0; i < 750; i += 70) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 750); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(750, i); ctx.stroke();
    }
    ctx.restore();
  }
  
  function drawRadiusCircles() {
    const cx = 375, cy = 375;
    const pRadius = getPlayerRadius();
    const eRadius = getEnemyRadius();
    const px = player.x - cameraX + cx;
    const py = player.y - cameraY + cy;
    const ex = enemy.x - cameraX + cx;
    const ey = enemy.y - cameraY + cy;
    
    ctx.save();
    ctx.beginPath();
    ctx.arc(375, 375, 371, 0, 2*Math.PI);
    ctx.clip();
    
    ctx.beginPath();
    ctx.arc(px, py, pRadius, 0, 2*Math.PI);
    ctx.strokeStyle = '#888888';
    ctx.lineWidth = 1.8;
    ctx.setLineDash([6, 8]);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.arc(ex, ey, eRadius, 0, 2*Math.PI);
    ctx.strokeStyle = '#aaaaaa';
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  
  function drawGunLines() {
    const cx = 375, cy = 375;
    const pAngle = player.angle + player.gunAngle - Math.PI/2;
    const pRad = getPlayerRadius();
    const px = player.x - cameraX + cx;
    const py = player.y - cameraY + cy;
    
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + Math.cos(pAngle) * pRad, py + Math.sin(pAngle) * pRad);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2.2;
    ctx.stroke();
    
    const ex = enemy.x - cameraX + cx;
    const ey = enemy.y - cameraY + cy;
    const eRad = getEnemyRadius();
    ctx.strokeStyle = '#ff5577';
    [enemy.angle + enemy.gunAAngle - Math.PI/2, enemy.angle + enemy.gunBAngle - Math.PI/2].forEach(a => {
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex + Math.cos(a) * eRad, ey + Math.sin(a) * eRad);
      ctx.stroke();
    });
  }
  
  function updateAndDrawTracers() {
    ctx.save();
    ctx.beginPath();
    ctx.arc(375, 375, 371, 0, 2*Math.PI);
    ctx.clip();
    
    for (let i = tracers.length-1; i >= 0; i--) {
      const t = tracers[i];
      t.progress += 0.15;
      if (t.progress >= 1) {
        tracers.splice(i, 1);
        continue;
      }
      
      const currentX = t.fromX + (t.toX - t.fromX) * t.progress;
      const currentY = t.fromY + (t.toY - t.fromY) * t.progress;
      
      ctx.beginPath();
      ctx.arc(currentX, currentY, 5 - t.progress * 3, 0, 2*Math.PI);
      ctx.fillStyle = t.color;
      ctx.fill();
    }
    ctx.restore();
  }
  
  function updateAndDrawMines() {
    const cx = 375, cy = 375;
    ctx.save();
    ctx.beginPath();
    ctx.arc(375, 375, 371, 0, 2*Math.PI);
    ctx.clip();
    
    for (let i = mines.length-1; i >= 0; i--) {
      const mine = mines[i];
      const screenX = mine.x - cameraX + cx;
      const screenY = mine.y - cameraY + cy;
      
      ctx.beginPath();
      ctx.arc(screenX, screenY, mine.radius, 0, 2*Math.PI);
      ctx.fillStyle = 'rgba(255, 50, 50, 0.4)';
      ctx.fill();
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 6]);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(screenX - 10, screenY);
      ctx.lineTo(screenX + 10, screenY);
      ctx.moveTo(screenX, screenY - 10);
      ctx.lineTo(screenX, screenY + 10);
      ctx.stroke();
      
      const distToPlayer = Math.hypot(player.x - mine.x, player.y - mine.y);
      if (distToPlayer < mine.radius && !isSyncing) {
        player.health = Math.max(0, player.health - mine.damage);
        mines.splice(i, 1);
        const rect = canvas.getBoundingClientRect();
        showHitAnimation(rect.left + (player.x - cameraX + cx), rect.top + (player.y - cameraY + cy), true);
        syncToFirebase();
        continue;
      }
      
      const distToEnemy = Math.hypot(enemy.x - mine.x, enemy.y - mine.y);
      if (distToEnemy < mine.radius && !isSyncing) {
        enemy.health = Math.max(0, enemy.health - mine.damage);
        mines.splice(i, 1);
        const rect = canvas.getBoundingClientRect();
        showHitAnimation(rect.left + (enemy.x - cameraX + cx), rect.top + (enemy.y - cameraY + cy), false);
        syncToFirebase();
      }
    }
    ctx.setLineDash([]);
    ctx.restore();
  }
  
  function drawGunConstraints() {
    const cx = 375, cy = 375;
    const px = player.x - cameraX + cx;
    const py = player.y - cameraY + cy;
    
    // Визуальное направление кормы (противоположно носу)
    // Нос корабля смотрит в сторону player.angle
    // А пушки расположены на корме, поэтому угол кормы = player.angle + Math.PI
    const sternAngle = player.angle + Math.PI / 2; // Это корма!
    const constraintRad = (parseInt(document.getElementById('gunConstraint').value) || 40) * Math.PI / 180;
    
    ctx.save();
    ctx.beginPath();
    ctx.arc(375, 375, 371, 0, 2*Math.PI);
    ctx.clip();
    
    // Рисуем дугу ограничения (сектор)
    ctx.beginPath();
    ctx.arc(px, py, getPlayerRadius(), sternAngle - constraintRad/2, sternAngle + constraintRad/2);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Рисуем граничные линии
    const radius = getPlayerRadius();
    const leftBound = sternAngle - constraintRad/2;
    const rightBound = sternAngle + constraintRad/2;
    
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + Math.cos(leftBound) * radius, py + Math.sin(leftBound) * radius);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + Math.cos(rightBound) * radius, py + Math.sin(rightBound) * radius);
    ctx.stroke();

    
    ctx.restore();
  }
    
  function updateGunConstraint() {
    const val = parseInt(document.getElementById('gunConstraint').value) || 40;
    const constraintRad = val * Math.PI / 180;
    const minAngle = Math.PI - constraintRad / 2;
    const maxAngle = Math.PI + constraintRad / 2;
    player.gunAngle = Math.min(maxAngle, Math.max(minAngle, player.gunAngle));
  }
  
  // ========== КРУТИЛКИ ==========
  function setupKnob(canvas, getAngle, setAngle, stepDegrees = 1) {
    const ctxKnob = canvas.getContext('2d');
    const centerX = 35, centerY = 35;
    const stepRad = stepDegrees * Math.PI / 180; // Конвертируем градусы в радианы
    
    function draw() {
      const angleRad = getAngle();
      ctxKnob.clearRect(0, 0, 70, 70);
      ctxKnob.beginPath();
      ctxKnob.arc(centerX, centerY, 28, 0, 2*Math.PI);
      ctxKnob.fillStyle = '#1c2028';
      ctxKnob.fill();    ctxKnob.strokeStyle = '#6a7a8a';
      ctxKnob.lineWidth = 3;
      ctxKnob.stroke();
      
      const pointerAngle = angleRad - Math.PI/2;
      const dx = Math.cos(pointerAngle) * 24;
      const dy = Math.sin(pointerAngle) * 24;
      ctxKnob.beginPath();
      ctxKnob.moveTo(centerX, centerY);
      ctxKnob.lineTo(centerX + dx, centerY + dy);
      ctxKnob.strokeStyle = '#ffbb33';
      ctxKnob.lineWidth = 4;
      ctxKnob.stroke();
      ctxKnob.fillStyle = '#ffaa00';
      ctxKnob.beginPath();
      ctxKnob.arc(centerX + dx, centerY + dy, 5, 0, 2*Math.PI);
      ctxKnob.fill();
    }
    
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (isSyncing) return;
      const delta = e.deltaY > 0 ? -stepRad : stepRad;
      let newAngle = getAngle() + delta;
      setAngle(newAngle);
      draw();
      syncToFirebase();
    });
    
    draw();
    return { refresh: draw };
  }
  
  // ========== FIREBASE СИНХРОНИЗАЦИЯ ==========
  function syncToFirebase() {
    if (isSyncing) return;
    isSyncing = true;
    
    gameRef.set({
      player: {
        x: player.x, y: player.y,
        angle: player.angle,
        gunAngle: player.gunAngle,
        health: player.health,
        moveAngleOffset: player.moveAngleOffset
      },
      enemy: {
        x: enemy.x, y: enemy.y,
        angle: enemy.angle,
        gunAAngle: enemy.gunAAngle,
        gunBAngle: enemy.gunBAngle,
        health: enemy.health,
        moveAngleOffset: enemy.moveAngleOffset
      },
      mines: mines
    }).then(() => {
      isSyncing = false;
      document.getElementById('connStatus').style.color = '#0f0';
      document.getElementById('connStatus').textContent = '🟢 СИНХРОНИЗАЦИЯ...';
    }).catch(() => {
      isSyncing = false;
      document.getElementById('connStatus').style.color = '#f00';
      document.getElementById('connStatus').textContent = '🔴 ОШИБКА!';
    });
  }
  
  // Загрузка из Firebase
  gameRef.on('value', (snapshot) => {
    if (isSyncing) return;
    const data = snapshot.val();
    if (data) {
      if (data.player) {
        player.x = data.player.x;
        player.y = data.player.y;
        player.angle = data.player.angle;
        player.gunAngle = data.player.gunAngle;
        player.health = data.player.health;
        player.moveAngleOffset = data.player.moveAngleOffset || 0;
      }
      if (data.enemy) {
        enemy.x = data.enemy.x;
        enemy.y = data.enemy.y;
        enemy.angle = data.enemy.angle;
        enemy.gunAAngle = data.enemy.gunAAngle;
        enemy.gunBAngle = data.enemy.gunBAngle;
        enemy.health = data.enemy.health;
        enemy.moveAngleOffset = data.enemy.moveAngleOffset || 0;
      }
      if (data.mines) mines = data.mines;
      
      updateCamera();
      updateAngleDisplays();
      
      // Обновить крутилки
      if (playerGunKnob) playerGunKnob.refresh();
      if (playerDirKnob) playerDirKnob.refresh();
      if (enemyGunAKnob) enemyGunAKnob.refresh();
      if (enemyGunBKnob) enemyGunBKnob.refresh();
      if (enemyDirKnob) enemyDirKnob.refresh();
    }
    document.getElementById('connStatus').style.color = '#0f0';
    document.getElementById('connStatus').textContent = '🟢 ОНЛАЙН';
    setTimeout(() => {
      if (document.getElementById('connStatus').textContent === '🟢 ОНЛАЙН') {
        document.getElementById('connStatus').textContent = '🟢 СИНХРОН';
      }
    }, 1000);
  });
  
  // ========== ИНИЦИАЛИЗАЦИЯ КРУТИЛОК ==========
  const playerGunKnob = setupKnob(
    document.getElementById('playerKnobGun'),
    () => player.gunAngle,
    (v) => { 
      const constraint = (parseInt(document.getElementById('gunConstraint').value) || 40) * Math.PI / 180;
      const min = Math.PI - constraint/2;
      const max = Math.PI + constraint/2;
      player.gunAngle = Math.min(max, Math.max(min, v));
    }
  );
  
  const playerDirKnob = setupKnob(
    document.getElementById('playerKnobDir'),
    () => player.angle,
    (v) => { 
      let diff = v - player.angle;
      while (diff > Math.PI) diff -= 2*Math.PI;
      while (diff < -Math.PI) diff += 2*Math.PI;
      player.moveAngleOffset += diff * 2;
      while (player.moveAngleOffset > Math.PI) player.moveAngleOffset -= 2*Math.PI;
      while (player.moveAngleOffset < -Math.PI) player.moveAngleOffset += 2*Math.PI;
      player.angle = v;
      updateAngleDisplays();
    }
  );
  
  const enemyGunAKnob = setupKnob(
    document.getElementById('enemyKnobGunA'),
    () => enemy.gunAAngle,
    (v) => { enemy.gunAAngle = v; }
  );
  
  const enemyGunBKnob = setupKnob(
    document.getElementById('enemyKnobGunB'),
    () => enemy.gunBAngle,
    (v) => { enemy.gunBAngle = v; }
  );
  
  const enemyDirKnob = setupKnob(
    document.getElementById('enemyKnobDir'),
    () => enemy.angle,
    (v) => {
      let diff = v - enemy.angle;
      while (diff > Math.PI) diff -= 2*Math.PI;
      while (diff < -Math.PI) diff += 2*Math.PI;
      enemy.moveAngleOffset += diff * 2;
      while (enemy.moveAngleOffset > Math.PI) enemy.moveAngleOffset -= 2*Math.PI;
      while (enemy.moveAngleOffset < -Math.PI) enemy.moveAngleOffset += 2*Math.PI;
      enemy.angle = v;
      updateAngleDisplays();
    }
  );
  
  // ========== КНОПКИ ==========
  document.getElementById('playerMoveBtn').addEventListener('click', () => moveShip(player, getPlayerStep(), true));
  document.getElementById('enemyMoveBtn').addEventListener('click', () => moveShip(enemy, getEnemyStep(), false));
  document.getElementById('playerFireBtn').addEventListener('click', () => fireShip(player, enemy, getPlayerDamage(), false));
  document.getElementById('enemyFireBtn').addEventListener('click', () => fireShip(enemy, player, getEnemyDamage(), true));
  document.getElementById('gunConstraint').addEventListener('input', () => updateGunConstraint());
  
  // ========== ПИВО ==========
  let beerCount = 0;
  document.getElementById('beerMug').addEventListener('click', () => {
    beerCount++;
    const toast = document.createElement('div');
    toast.textContent = beerCount === 1 ? '🍺 Первая за победу!' : `🍺🍺 Еще одна! (${beerCount})`;
    toast.style.position = 'fixed';
    toast.style.bottom = '80px';
    toast.style.right = '30px';
    toast.style.background = 'rgba(0,0,0,0.8)';
    toast.style.color = '#ffd700';
    toast.style.padding = '8px 16px';
    toast.style.borderRadius = '20px';
    toast.style.fontFamily = 'monospace';
    toast.style.fontSize = '14px';
    toast.style.border = '1px solid #ffd700';
    toast.style.pointerEvents = 'none';
    toast.style.zIndex = '10000';
    toast.style.animation = 'fadeOut 2s ease-out forwards';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
    
    const beer = document.getElementById('beerMug');
    beer.style.transform = 'scale(1.1)';
    setTimeout(() => beer.style.transform = 'scale(1)', 200);
  });
  
  // ========== ЗАПУСК ==========
  updateCamera();
  updateGunConstraint();
  
  function gameLoop() {
    drawRadar();
    drawRadiusCircles();
    drawGunConstraints();
    drawGunLines();
    drawShip(ctx, player, cameraX, cameraY, false);
    drawShip(ctx, enemy, cameraX, cameraY, true);
    updateAndDrawTracers();
    updateAndDrawMines();
    requestAnimationFrame(gameLoop);
  }
  
  gameLoop();
  
  console.log('Игра запущена! Firebase синхронизация активна.');
</script>
</body>

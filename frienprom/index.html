<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер — корпоративный</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #BE423E;
            --accent-hover: #a53531;
            --bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 40px 0 40px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .static-logo {
            width: 204px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .static-logo svg {
            width: 17px;
            height: 17px;
            fill: #ffffff;
        }

        .brand-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .header-nav {
            display: flex;
            gap: 32px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            align-items: center;
            height: 40px;
        }

        .nav-tab {
            padding: 6px 4px 10px 4px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color var(--transition);
            border: none;
            background: transparent;
            letter-spacing: -0.01em;
            white-space: nowrap;
            line-height: 1.2;
            position: relative;
            z-index: 2;
        }

        .nav-tab.active {
            color: var(--text);
            font-weight: 600;
        }

        .nav-tab:hover { color: var(--text); }

        .nav-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .main { flex: 1; display: flex; align-items: stretch; overflow: hidden; }
        .page { display: none; width: 100%; }
        .page.active { display: flex; }

        .home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 60px 32px 80px;
            gap: 8px;
        }

        .clicker-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .clicker-logo-wrapper {
            position: relative;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 12px;
        }

        .clicker-logo-placeholder {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fdf2f2 0%, #fce4e4 50%, #fef2f2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(190, 66, 62, 0.12), 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .clicker-logo-placeholder svg {
            width: 58px;
            height: 58px;
            fill: var(--accent);
            opacity: 0.8;
            pointer-events: none;
        }

        .clicker-logo-placeholder.clicked {
            animation: clickPop 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes clickPop {
            0% { transform: scale(1); box-shadow: 0 8px 30px rgba(190, 66, 62, 0.12); }
            30% { transform: scale(0.88); box-shadow: 0 4px 15px rgba(190, 66, 62, 0.08); }
            55% { transform: scale(1.06); box-shadow: 0 0 0 14px rgba(190, 66, 62, 0.06); }
            100% { transform: scale(1); box-shadow: 0 8px 30px rgba(190, 66, 62, 0.12); }
        }

        .float-plus {
            position: absolute;
            pointer-events: none;
            font-weight: 700;
            font-size: 18px;
            color: white;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            60% { opacity: 0.7; transform: translateY(-50px) scale(1.25); }
            100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
        }

        .points-display {
            font-size: 72px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.03em;
            line-height: 1;
            transition: transform 0.1s ease;
        }

        .points-display.bump { animation: bumpNum 0.3s ease; }

        @keyframes bumpNum {
            0% { transform: scale(1); }
            40% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        .points-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            margin-bottom: 18px;
        }

        .nickname-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nickname-wrapper {
            position: relative;
        }

        .nickname-input {
            padding: 10px 16px;
            border: none;
            border-bottom: 1.5px solid #e5e7eb;
            font-size: 14px;
            font-family: var(--font);
            width: 220px;
            outline: none;
            background: transparent;
            color: var(--text);
            transition: border-color var(--transition);
            letter-spacing: -0.01em;
        }

        .nickname-input:focus { border-bottom-color: var(--accent); }
        .nickname-input::placeholder { color: var(--text-muted); font-size: 13px; }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
        }
        .status-dot.found { background: #16a34a; }
        .status-dot.new { background: #9ca3af; }
        .status-dot.checking { background: #f59e0b; animation: pulse 1s infinite; }
        .status-dot.blocked { background: #BE423E; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .nickname-status {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: center;
            min-height: 16px;
        }

        .btn {
            padding: 8px 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--accent);
            transition: color var(--transition), opacity var(--transition);
            font-family: var(--font);
            letter-spacing: -0.01em;
            white-space: nowrap;
            text-decoration: none;
        }

        .btn:hover { color: var(--accent-hover); opacity: 0.9; }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .btn-sm { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
        .btn-sm:hover { color: var(--accent); }

        .leaderboard-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 60px 32px 80px;
            gap: 6px;
        }

        .leaderboard-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-bottom: 2px;
        }

        .leaderboard-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 24px;
        }

        .leaderboard-table {
            width: 100%;
            max-width: 520px;
            border-collapse: collapse;
            font-size: 14px;
            margin-bottom: 14px;
        }

        .leaderboard-table thead th {
            text-align: left;
            padding: 10px 8px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: none;
        }

        .leaderboard-table tbody td {
            padding: 14px 8px;
            color: var(--text);
            font-weight: 500;
            border-bottom: none;
        }

        .leaderboard-table .rank-col { width: 40px; text-align: center; font-weight: 700; color: var(--text-muted); }
        .leaderboard-table .rank-1 { color: #f59e0b; font-size: 18px; }
        .leaderboard-table .rank-2 { color: #94a3b8; font-size: 16px; }
        .leaderboard-table .rank-3 { color: #b9754e; font-size: 15px; }
        .leaderboard-table .nickname-col { font-weight: 600; color: var(--text); }
        .leaderboard-table .points-col { text-align: right; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; font-family: 'SF Mono', 'Consolas', 'Monaco', monospace; }
        .leaderboard-table .empty-row td { color: var(--text-muted); font-style: italic; font-weight: 400; text-align: center; }

        .refresh-row { display: flex; align-items: center; justify-content: center; gap: 14px; }
        .last-updated { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

        .contacts-page { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .contacts-card { text-align: center; max-width: 500px; padding: 40px; margin-bottom: 10%; }
        .contacts-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
        .contacts-subtitle { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 32px; }
        .contact-item { margin-bottom: 18px; font-size: 15px; color: var(--text-secondary); line-height: 1.6; }
        .contact-item strong { color: var(--text); font-weight: 600; }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: #065f46; }
        .toast.error { background: #991b1b; }

        @media (max-width: 640px) {
            .header { padding: 20px 20px 0 20px; }
            .header-nav { gap: 20px; }
            .brand-name { display: none; }
            .home-page, .leaderboard-page { padding: 30px 16px 40px; }
            .clicker-logo-placeholder { width: 120px; height: 120px; }
            .clicker-logo-placeholder svg { width: 48px; height: 48px; }
            .points-display { font-size: 52px; }
            .nickname-input { width: 160px; }
            .leaderboard-table { max-width: 100%; }
        }
    </style>
</head>

    <script>
        (function() {
            // ⚠️ ВАШ КОНФИГ FIREBASE
            const firebaseConfig = {
            apiKey: "AIzaSyCCbTlENHjkS1eMpcFu3laNVrwjzQThZ8w",
            authDomain: "frienprom.firebaseapp.com",
            databaseURL: "https://frienprom-default-rtdb.firebaseio.com",
            projectId: "frienprom",
            storageBucket: "frienprom.firebasestorage.app",
            messagingSenderId: "807128009668",
            appId: "1:807128009668:web:39f36af28bf28455dd7291",
            measurementId: "G-15WZBJNE67"
            };

            let db = null;
            let firebaseReady = false;
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                firebaseReady = true;
                console.log('✅ Firebase готов (Realtime Database)');
            } catch (e) {
                console.warn('⚠️ Firebase не настроен.', e);
            }

            const headerNav = document.getElementById('headerNav');
            const navTabs = document.querySelectorAll('.nav-tab');
            const navIndicator = document.getElementById('navIndicator');
            const pages = document.querySelectorAll('.page');
            const clickerPlaceholder = document.getElementById('clickerPlaceholder');
            const clickerWrapper = document.getElementById('clickerWrapper');
            const pointsDisplay = document.getElementById('pointsDisplay');
            const nicknameInput = document.getElementById('nicknameInput');
            const statusDot = document.getElementById('statusDot');
            const nicknameStatus = document.getElementById('nicknameStatus');
            const refreshBtn = document.getElementById('refreshLeaderboardBtn');
            const leaderboardBody = document.getElementById('leaderboardBody');
            const lastUpdatedEl = document.getElementById('lastUpdated');
            const toast = document.getElementById('toast');

            let totalPoints = 0;
            let currentNickname = '';
            let nicknameExists = false; // Есть ли такой ник в базе
            let isChecking = false;
            let checkTimeout = null;
            let toastTimer;

            // ============ НАВИГАЦИЯ ============
            function updateIndicator(activeTab) {
                if (!activeTab || !navIndicator) return;
                const navRect = headerNav.getBoundingClientRect();
                const tabRect = activeTab.getBoundingClientRect();
                navIndicator.style.left = (tabRect.left - navRect.left) + 'px';
                navIndicator.style.width = tabRect.width + 'px';
            }

            function setActiveTab(tab) {
                navTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                updateIndicator(tab);
                const target = tab.getAttribute('data-page');
                pages.forEach(p => p.classList.remove('active'));
                const pageEl = document.getElementById('page-' + target);
                if (pageEl) pageEl.classList.add('active');
                if (target === 'leaderboard' && firebaseReady) fetchLeaderboard();
            }

            navTabs.forEach(tab => {
                tab.addEventListener('click', () => setActiveTab(tab));
            });

            const initialActive = document.querySelector('.nav-tab.active');
            if (initialActive) setTimeout(() => updateIndicator(initialActive), 50);
            window.addEventListener('resize', () => {
                const active = document.querySelector('.nav-tab.active');
                if (active) updateIndicator(active);
            });

            // ============ ТОСТ ============
            function showToast(msg, type = '') {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = 'toast ' + type + ' show';
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            // ============ КЛИКЕР ============
            function animateClick() {
                clickerPlaceholder.classList.remove('clicked');
                void clickerPlaceholder.offsetWidth;
                clickerPlaceholder.classList.add('clicked');
                setTimeout(() => clickerPlaceholder.classList.remove('clicked'), 350);
            }

            function bumpPoints() {
                pointsDisplay.classList.remove('bump');
                void pointsDisplay.offsetWidth;
                pointsDisplay.classList.add('bump');
            }

            function spawnPlus(x, y) {
                const el = document.createElement('span');
                el.className = 'float-plus';
                el.textContent = '+1';
                const rect = clickerWrapper.getBoundingClientRect();
                el.style.left = (x - rect.left - 14) + 'px';
                el.style.top = (y - rect.top - 20) + 'px';
                clickerWrapper.appendChild(el);
                setTimeout(() => el.remove(), 800);
            }

            // ============ ЛОГИКА КЛИКА С АВТОСОЗДАНИЕМ ============
            function handleClick(e) {
                // Если никнейм не введён — просто кликаем локально
                if (!currentNickname) {
                    totalPoints++;
                    pointsDisplay.textContent = totalPoints.toLocaleString('ru-RU');
                    animateClick();
                    bumpPoints();
                    spawnPlus(e.clientX, e.clientY);
                    showToast('Введите имя для сохранения', '');
                    return;
                }

                // Обычный клик — всегда работает
                totalPoints++;
                pointsDisplay.textContent = totalPoints.toLocaleString('ru-RU');
                animateClick();
                bumpPoints();
                spawnPlus(e.clientX, e.clientY);

                // Сохраняем в базу
                if (nicknameExists) {
                    saveToDB(currentNickname, totalPoints);
                } else {
                    createUserInDB(currentNickname, totalPoints);
                }
            }


            // ============ Realtime Database ============
            function sanitize(nick) {
                return nick.trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-zа-яё0-9_-]/gi, '').substring(0, 60);
            }

            function saveToDB(nick, points) {
                if (!firebaseReady) return;
                const id = sanitize(nick);
                if (!id) return;
                db.ref('leaderboard/' + id).update({
                    points: points,
                    updatedAt: Date.now()
                }).catch(err => {
                    console.error('Ошибка обновления:', err);
                });
            }

            function createUserInDB(nick, points) {
                if (!firebaseReady) return;
                const id = sanitize(nick);
                if (!id) return;
                db.ref('leaderboard/' + id).set({
                    nickname: nick.trim(),
                    points: points,
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                }).then(() => {
                    nicknameExists = true;
                    updateNicknameStatus('found');
                    showToast('Профиль создан!', 'success');
                }).catch(err => {
                    console.error('Ошибка создания:', err);
                    showToast('Ошибка создания профиля', 'error');
                });
            }

            // Проверка ника при вводе
            function checkNickname(nick) {
                const trimmed = nick.trim();
                if (!trimmed) {
                    nicknameExists = false;
                    currentNickname = '';
                    totalPoints = 0;
                    pointsDisplay.textContent = '0';
                    updateNicknameStatus('empty');
                    return;
                }

                currentNickname = trimmed;
                const id = sanitize(trimmed);
                if (!id) {
                    updateNicknameStatus('empty');
                    return;
                }

                updateNicknameStatus('checking');

                if (!firebaseReady) {
                    updateNicknameStatus('new');
                    return;
                }

                db.ref('leaderboard/' + id).once('value').then(snapshot => {
                    if (sanitize(nicknameInput.value.trim()) !== id) return;

                    const data = snapshot.val();
                    if (data && typeof data.points === 'number') {
                        // Проверка на playable: false
                        if (data.playable === false) {
                            nicknameExists = false;
                            totalPoints = 0;
                            pointsDisplay.textContent = '0';
                            updateNicknameStatus('blocked');
                            return;
                        }

                        nicknameExists = true;
                        totalPoints = data.points;
                        pointsDisplay.textContent = totalPoints.toLocaleString('ru-RU');
                        updateNicknameStatus('found');
                    } else {
                        nicknameExists = false;
                        totalPoints = 0;
                        pointsDisplay.textContent = '0';
                        updateNicknameStatus('new');
                    }
                }).catch(err => {
                    console.error('Ошибка проверки ника:', err);
                    updateNicknameStatus('new');
                });
            }

            function updateNicknameStatus(status) {
                statusDot.style.display = 'inline-block';
                statusDot.className = 'status-dot';
                switch (status) {
                    case 'found':
                        statusDot.classList.add('found');
                        nicknameStatus.textContent = ' ';
                        nicknameStatus.style.color = '#16a34a';
                        break;
                    case 'new':
                        statusDot.classList.add('new');
                        nicknameStatus.textContent = 'Новый инвестор. Кликните логотип для регистрации.';
                        nicknameStatus.style.color = '#9ca3af';
                        break;
                    case 'checking':
                        statusDot.classList.add('checking');
                        nicknameStatus.textContent = 'Проверка...';
                        nicknameStatus.style.color = '#f59e0b';
                        break;
                    case 'blocked':
                        statusDot.classList.add('blocked');
                        nicknameStatus.textContent = 'Ты чё, самый умный?';
                        nicknameStatus.style.color = '#BE423E';
                        break;
                    case 'empty':
                        statusDot.style.display = 'none';
                        nicknameStatus.textContent = '';
                        totalPoints = 0;
                        pointsDisplay.textContent = '0';
                        break;
                }
            }

            // Обработчик ввода с debounce
            nicknameInput.addEventListener('input', () => {
                const nick = nicknameInput.value;
                // Сохраняем никнейм локально при вводе
                currentNickname = nick.trim();
                saveLocal();

                // Отложенная проверка в базе (debounce 500ms)
                clearTimeout(checkTimeout);
                if (!nick.trim()) {
                    checkNickname('');
                    return;
                }
                updateNicknameStatus('checking');
                checkTimeout = setTimeout(() => checkNickname(nick), 500);
            });

            // ============ ТАБЛИЦА ЛИДЕРОВ ============
            function fetchLeaderboard() {
                if (!firebaseReady) {
                    leaderboardBody.innerHTML = '<tr class="empty-row"><td colspan="3">Firebase не настроен</td></tr>';
                    return;
                }
                db.ref('leaderboard').orderByChild('points').limitToLast(10).once('value').then(snapshot => {
                    const data = snapshot.val();
                    const players = [];
                    if (data) {
                        Object.values(data).forEach(p => players.push(p));
                    }
                    players.sort((a, b) => b.points - a.points);
                    renderLeaderboard(players.slice(0, 10));
                    lastUpdatedEl.textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                }).catch(err => {
                    leaderboardBody.innerHTML = '<tr class="empty-row"><td colspan="3">Ошибка загрузки</td></tr>';
                });
            }

            function renderLeaderboard(players) {
                if (!players.length) {
                    leaderboardBody.innerHTML = '<tr class="empty-row"><td colspan="3">Пока пусто</td></tr>';
                    return;
                }
                const ranks = ['', 'rank-1', 'rank-2', 'rank-3'];
                const symbols = ['', '1', '2', '3'];
                let html = '';
                for (let i = 0; i < 10; i++) {
                    if (i < players.length) {
                        const p = players[i];
                        html += `<tr>
                            <td class="rank-col ${ranks[i+1] || ''}">${symbols[i+1] || i+1}</td>
                            <td class="nickname-col">${escapeHTML(p.nickname)}</td>
                            <td class="points-col">${(p.points||0).toLocaleString('ru-RU')}</td>
                        </tr>`;
                    } else {
                        html += `<tr><td class="rank-col" style="color:#d1d5db;">${i+1}</td><td style="color:#d1d5db;">—</td><td class="points-col" style="color:#d1d5db;">—</td></tr>`;
                    }
                }
                leaderboardBody.innerHTML = html;
            }

            function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

            refreshBtn.addEventListener('click', fetchLeaderboard);

            // ============ LOCALSTORAGE ============
            function loadLocal() {
                try {
                    const s = localStorage.getItem('clickcorp_v5');
                    if (s) {
                        const p = JSON.parse(s);
                        if (p.nickname) {
                            currentNickname = p.nickname;
                            nicknameInput.value = currentNickname;
                            // Проверить никнейм при загрузке
                            if (currentNickname) checkNickname(currentNickname);
                        }
                    }
                } catch (e) {}
            }

            function saveLocal() {
                localStorage.setItem('clickcorp_v5', JSON.stringify({ nickname: currentNickname }));
            }

            // Сохраняем при уходе
            window.addEventListener('beforeunload', saveLocal);

            // ============ ИНИЦИАЛИЗАЦИЯ ============
            loadLocal();
            fetchLeaderboard();
            
            // Привязка обработчиков клика
            clickerPlaceholder.addEventListener('click', handleClick);
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Чат</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #0f0f14;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #eaeaf0;
}

.chat-container {
    width: 400px;
    height: 600px;
    background: #1a1a22;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    overflow: hidden;
}

.chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.message {
    display: flex;
    margin-bottom: 12px;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #444;
    margin-right: 10px;
    flex-shrink: 0;
}

.message-content {
    background: #2a2a35;
    padding: 10px 12px;
    border-radius: 12px;
    max-width: 70%;
}

.meta {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 5px;
}

.chat-input {
    display: flex;
    padding: 10px;
    background: #15151c;
    border-top: 1px solid #2a2a35;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #2a2a35;
    color: white;
}

.chat-input button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #5a6cff;
    color: white;
    cursor: pointer;
}

.chat-input buton:hover {
    background: #6f7fff;
}
.chat-messages::-webkit-scrollbar {
    width: 8px;
}

.chat-messages::-webkit-scrollbar-track {
    background: transparent;
}

.chat-messages::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
}

.chat-messages::-webkit-scrollbar-thumb:hover {
    background: #666;
}

.chat-messages {
    scrollbar-width: thin;
    scrollbar-color: #444 transparent;
}
</style>
</head>

<body>
<input type="text" id="input" placeholder="Напиши сообщение..." autocomplete="off">
<div class="chat-container">

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
        <form autocomplete="off">
        <input type="text" id="input" placeholder="Напиши сообщение..." autocomplete="off">
        </form>
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    const messages = document.getElementById("messages");

    const now = new Date();
    const time = now.toLocaleTimeString();
    const date = now.toLocaleDateString();

    const message = document.createElement("div");
    message.className = "message";

    message.innerHTML = `
        <div class="avatar"></div>
        <div>
            <div class="message-content">${text}</div>
            <div class="meta">${date} ${time}</div>
        </div>
    `;

    messages.appendChild(message);
    messages.scrollTop = messages.scrollHeight;

    input.value = "";
}
const input = document.getElementById("input");
input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});
</script>

</body>
</html>
